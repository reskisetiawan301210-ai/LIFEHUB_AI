<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nocturne — Music, Everywhere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   0. DESIGN TOKENS
   ============================================================ */
:root{
  --bg-0:#08090c;
  --bg-1:#0e1015;
  --bg-2:#14171e;
  --glass:rgba(255,255,255,.045);
  --glass-brd:rgba(255,255,255,.08);
  --ink-0:#f3f0e9;
  --ink-1:#b9bcc4;
  --ink-2:#787c86;
  --gold:#e8b368;
  --gold-dim:#8a6a3d;
  --teal:#2dd4bf;
  --danger:#e2664f;
  --radius-l:22px;
  --radius-m:14px;
  --radius-s:9px;
  --ff-display:'Fraunces', serif;
  --ff-body:'Inter', system-ui, sans-serif;
  --shadow-glow: 0 0 60px -10px rgba(232,179,104,.25);
}
[data-theme="light"]{
  --bg-0:#f3efe6; --bg-1:#ece5d6; --bg-2:#e3dac8;
  --glass:rgba(20,20,20,.04); --glass-brd:rgba(20,20,20,.08);
  --ink-0:#181611; --ink-1:#4b473d; --ink-2:#84806f;
  --shadow-glow: 0 0 60px -10px rgba(138,90,20,.18);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg-0); color:var(--ink-0); font-family:var(--ff-body);
  overflow:hidden; position:relative;
  transition:background .4s ease, color .4s ease;
}
::selection{background:var(--gold); color:#181207;}
::-webkit-scrollbar{width:6px; height:6px;}
::-webkit-scrollbar-thumb{background:var(--glass-brd); border-radius:8px;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input{font-family:inherit;}
:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

/* ============================================================
   1. AMBIENT BACKGROUND (aurora grain + particles)
   ============================================================ */
#bg-canvas{position:fixed; inset:0; z-index:0; opacity:.55; pointer-events:none;}
.aurora{
  position:fixed; inset:-20%; z-index:0; pointer-events:none; filter:blur(90px); opacity:.35;
  background:
    radial-gradient(circle at 20% 20%, var(--gold) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, var(--teal) 0%, transparent 30%),
    radial-gradient(circle at 50% 80%, var(--gold-dim) 0%, transparent 35%);
  animation:auroraShift 22s ease-in-out infinite alternate;
}
@keyframes auroraShift{ 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(-4%,3%) scale(1.08);} }

/* ============================================================
   2. APP SHELL LAYOUT (DESKTOP & LAPTOP)
   ============================================================ */
.app{position:relative; z-index:1; display:grid; grid-template-columns:240px 1fr; grid-template-rows:1fr auto; height:100vh;}
.sidebar{
  grid-row:1/3; border-right:1px solid var(--glass-brd); background:var(--glass); backdrop-filter:blur(24px);
  display:flex; flex-direction:column; padding:22px 16px; gap:26px; overflow-y:auto;
}
.brand{display:flex; align-items:center; gap:10px; font-family:var(--ff-display); font-size:21px; font-weight:600; letter-spacing:.02em; padding:0 6px;}
.brand .mark{width:30px; height:30px; border-radius:9px; background:linear-gradient(145deg,var(--gold),var(--gold-dim)); position:relative; box-shadow:var(--shadow-glow);}
.brand .mark::after{content:""; position:absolute; inset:9px; border-radius:50%; background:var(--bg-0);}
.nav-group{display:flex; flex-direction:column; gap:2px;}
.nav-label{font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-2); padding:10px 10px 6px;}
.nav-item{display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:var(--radius-s); font-size:14px; color:var(--ink-1); transition:.18s; cursor:pointer;}
.nav-item svg{width:17px; height:17px; opacity:.85; flex-shrink:0;}
.nav-item:hover{background:var(--glass); color:var(--ink-0);}
.nav-item.active{background:var(--glass); color:var(--gold); box-shadow:inset 0 0 0 1px var(--glass-brd);}
.filters{margin-top:auto; display:flex; flex-direction:column; gap:8px; padding-top:14px; border-top:1px solid var(--glass-brd);}
.filters select{width:100%; background:var(--glass); border:1px solid var(--glass-brd); color:var(--ink-1); font-size:12.5px; padding:8px 9px; border-radius:var(--radius-s); appearance:none;}

.main{overflow-y:auto; padding:20px 34px 140px; position:relative;}
.topbar{position:sticky; top:0; z-index:5; display:flex; gap:14px; align-items:center; padding:10px 0 18px; background:linear-gradient(var(--bg-0) 70%, transparent);}
.search-wrap{flex:1; position:relative; max-width:640px;}
.search-wrap input{
  width:100%; padding:13px 44px 13px 44px; border-radius:999px; border:1px solid var(--glass-brd);
  background:var(--glass); backdrop-filter:blur(18px); color:var(--ink-0); font-size:14.5px;
}
.search-wrap input::placeholder{color:var(--ink-2);}
.search-icon{position:absolute; left:16px; top:50%; transform:translateY(-50%); width:16px; height:16px; opacity:.6;}
.mic-btn{position:absolute; right:8px; top:50%; transform:translateY(-50%); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-1); transition:.2s;}
.mic-btn:hover{background:var(--glass); color:var(--gold);}
.mic-btn.listening{color:var(--danger); animation:pulseMic 1s infinite;}
@keyframes pulseMic{0%,100%{opacity:1;}50%{opacity:.4;}}
.suggest-panel{
  position:absolute; top:52px; left:0; right:0; background:var(--bg-2); border:1px solid var(--glass-brd); border-radius:var(--radius-m);
  box-shadow:0 20px 50px rgba(0,0,0,.5); max-height:340px; overflow-y:auto; display:none; z-index:20;
}
.suggest-panel.open{display:block;}
.suggest-row{display:flex; align-items:center; gap:10px; padding:10px 14px; font-size:13.5px; color:var(--ink-1);}
.suggest-row:hover{background:var(--glass); color:var(--ink-0); cursor:pointer;}
.suggest-row svg{width:14px; height:14px; opacity:.5;}
.icon-btn{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--glass); border:1px solid var(--glass-brd); transition:.2s; flex-shrink:0;}
.icon-btn:hover{border-color:var(--gold); color:var(--gold); transform:translateY(-1px);}
.icon-btn svg{width:16px; height:16px;}

.section-title{display:flex; align-items:baseline; gap:10px; margin:28px 0 14px;}
.section-title h2{font-family:var(--ff-display); font-size:22px; font-weight:600;}
.section-title span{font-size:12px; color:var(--ink-2);}
.hscroll{display:flex; gap:16px; overflow-x:auto; padding-bottom:8px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch;}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:16px;}

/* CARDS & LIST ROWS */
.card{
  scroll-snap-align:start; width:168px; flex-shrink:0; background:var(--glass); border:1px solid var(--glass-brd);
  border-radius:var(--radius-m); padding:12px; cursor:pointer; transition:.25s; position:relative;
}
.card:hover{transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,.35); border-color:var(--glass-brd);}
.card .art{width:100%; aspect-ratio:1; border-radius:var(--radius-s); overflow:hidden; position:relative; background:var(--bg-2);}
.card .art img{width:100%; height:100%; object-fit:cover; display:block;}
.card .playhit{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.35); opacity:0; transition:.2s;}
.card:hover .playhit{opacity:1;}
.card .playhit button{width:42px; height:42px; border-radius:50%; background:var(--gold); color:#181207; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(232,179,104,.4);}
.card .playhit svg{width:17px; height:17px;}
.card .title{margin-top:10px; font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.card .sub{font-size:12px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
.card .badge{position:absolute; top:8px; left:8px; font-size:9px; letter-spacing:.06em; text-transform:uppercase; background:rgba(0,0,0,.55); color:var(--gold); padding:3px 6px; border-radius:5px;}

.list-row{display:grid; grid-template-columns:26px 42px 1fr auto auto; align-items:center; gap:12px; padding:8px 10px; border-radius:var(--radius-s); transition:.15s; cursor:pointer;}
.list-row:hover{background:var(--glass);}
.list-row.playing{background:var(--glass); box-shadow:inset 0 0 0 1px var(--gold-dim);}
.list-row .idx{color:var(--ink-2); font-size:12.5px; text-align:center;}
.list-row .thumb{width:42px; height:42px; border-radius:7px; object-fit:cover; background:var(--bg-2);}
.list-row .meta .t{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:340px;}
.list-row .meta .a{font-size:12px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.list-row .dur{font-size:12px; color:var(--ink-2);}
.list-row .row-actions{display:flex; gap:6px; opacity:0; transition:.15s;}
.list-row:hover .row-actions{opacity:1;}
.row-actions button{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-1);}
.row-actions button:hover{color:var(--gold); background:var(--glass);}
.row-actions svg{width:14px; height:14px;}

.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 20px; color:var(--ink-2); gap:10px;}
.empty-state svg{width:46px; height:46px; opacity:.4;}
.skeleton{background:linear-gradient(90deg,var(--glass) 25%, var(--glass-brd) 37%, var(--glass) 63%); background-size:400% 100%; animation:shimmer 1.4s infinite; border-radius:var(--radius-s);}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}

/* ============================================================
   3. PLAYER BAR
   ============================================================ */
.playerbar{
  grid-column:1/3; border-top:1px solid var(--glass-brd); background:var(--bg-1); backdrop-filter:blur(30px);
  display:grid; grid-template-columns:280px 1fr 280px; align-items:center; padding:10px 20px; gap:16px; position:relative; z-index:10;
}
.np{display:flex; align-items:center; gap:12px; min-width:0;}
.np .art-wrap{position:relative; width:54px; height:54px; flex-shrink:0;}
.np .art-wrap img{width:100%; height:100%; border-radius:10px; object-fit:cover; background:var(--bg-2);}
.np .art-wrap::before{content:""; position:absolute; inset:-8px; border-radius:16px; background:radial-gradient(circle,var(--gold) 0%, transparent 70%); opacity:0; transition:.4s;}
.np.playing .art-wrap::before{opacity:.35;}
.np .meta{min-width:0;}
.np .meta .t{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px;}
.np .meta .a{font-size:11.5px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px;}
.np .heart{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.np .heart svg{width:16px; height:16px;}
.np .heart.liked{color:var(--gold);}

.controls{display:flex; flex-direction:column; align-items:center; gap:6px; width:100%;}
.ctl-row{display:flex; align-items:center; gap:16px;}
.ctl-row button{color:var(--ink-1); transition:.18s; display:flex;}
.ctl-row button:hover{color:var(--ink-0);}
.ctl-row button.active{color:var(--gold);}
.ctl-row svg{width:17px;height:17px;}
.play-toggle{width:38px; height:38px; border-radius:50%; background:var(--ink-0); color:var(--bg-0); display:flex; align-items:center; justify-content:center; transition:.15s;}
.play-toggle:hover{transform:scale(1.06);}
.play-toggle svg{width:16px; height:16px;}
.seek-row{display:flex; align-items:center; gap:9px; width:100%; max-width:560px;}
.time{font-size:11px; color:var(--ink-2); width:36px; text-align:center; font-variant-numeric:tabular-nums;}
.progress{flex:1; height:4px; border-radius:4px; background:var(--glass-brd); position:relative; cursor:pointer;}
.progress .fill{position:absolute; left:0; top:0; height:100%; border-radius:4px; background:var(--gold); width:0%;}
.progress .knob{position:absolute; top:50%; width:11px; height:11px; border-radius:50%; background:var(--gold); transform:translate(-50%,-50%); left:0%; opacity:0; transition:.15s;}
.progress:hover .knob{opacity:1;}

.right-tools{display:flex; align-items:center; justify-content:flex-end; gap:10px;}
.vis-canvas{width:64px; height:28px; opacity:.85;}
.vol-wrap{display:flex; align-items:center; gap:6px; width:110px;}
.vol-wrap .progress{height:4px;}
.right-tools button svg{width:16px; height:16px;}
.right-tools button{color:var(--ink-1);}
.right-tools button:hover{color:var(--ink-0);}
.right-tools button.active{color:var(--gold);}

/* ============================================================
   4. MODALS, TOASTS, DRAWER
   ============================================================ */
.toast-stack{position:fixed; bottom:96px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:100;}
.toast{background:var(--bg-2); border:1px solid var(--glass-brd); padding:11px 16px; border-radius:var(--radius-s); font-size:13px; box-shadow:0 12px 30px rgba(0,0,0,.4); animation:toastIn .25s ease;}
@keyframes toastIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

.drawer{position:fixed; top:0; right:0; height:100vh; width:360px; background:var(--bg-1); border-left:1px solid var(--glass-brd); backdrop-filter:blur(30px); transform:translateX(100%); transition:.32s cubic-bezier(.2,.9,.25,1); z-index:50; display:flex; flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-head{display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--glass-brd);}
.drawer-head h3{font-family:var(--ff-display); font-size:17px; font-weight:600;}
.drawer-body{flex:1; overflow-y:auto; padding:12px;}
.lyrics-body{padding:26px 24px; font-size:15.5px; line-height:2; color:var(--ink-1); white-space:pre-line; font-family:var(--ff-display);}

.modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:60;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg-2); border:1px solid var(--glass-brd); border-radius:var(--radius-m); padding:22px; width:340px;}
.modal h3{font-family:var(--ff-display); margin-bottom:14px; font-size:17px;}
.modal input{width:100%; padding:10px 12px; border-radius:var(--radius-s); background:var(--glass); border:1px solid var(--glass-brd); color:var(--ink-0); margin-bottom:14px;}
.modal .row{display:flex; gap:10px; justify-content:flex-end;}
.btn{padding:9px 16px; border-radius:999px; font-size:13px; font-weight:600;}
.btn.primary{background:var(--gold); color:#181207;}
.btn.ghost{background:var(--glass); border:1px solid var(--glass-brd); color:var(--ink-1);}

.status-pill{display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-2); background:var(--glass); border:1px solid var(--glass-brd); padding:4px 9px; border-radius:999px;}
.status-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--teal);}

.sidebar-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  z-index:75; display:none; opacity:0; transition:opacity .3s;
}
.sidebar-overlay.active{display:block; opacity:1;}

/* ============================================================
   5. MOBILE RESPONSIVE OVERRIDES (< 880px)
   ============================================================ */
@media(max-width:880px){
  .app{grid-template-columns:1fr; grid-template-rows:1fr auto;}
  .sidebar{
    position:fixed; left:0; top:0; bottom:0; width:260px; transform:translateX(-100%);
    transition:.3s cubic-bezier(.2,.9,.25,1); z-index:80; box-shadow:10px 0 30px rgba(0,0,0,0.6);
  }
  .sidebar.open{transform:translateX(0);}
  
  .main{padding:14px 16px 180px;}
  .topbar{padding:6px 0 12px; gap:10px;}
  .status-pill{display:none;}
  
  /* Grid & Cards di HP */
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px;}
  .card{width:100%; padding:10px;}
  .card .playhit{opacity:0.85; background:rgba(0,0,0,0.25);}
  
  /* Rows di HP */
  .list-row{grid-template-columns:20px 36px 1fr auto; gap:8px; padding:8px 8px;}
  .list-row .dur{display:none;}
  .list-row .row-actions{opacity:1;}
  .list-row .meta .t{max-width:180px; font-size:13px;}
  
  /* Floating Player Bar di HP */
  .playerbar{
    position:fixed; bottom:0; left:0; right:0; grid-column:auto;
    grid-template-columns:1fr; grid-template-rows:auto auto auto; gap:10px;
    padding:10px 14px 14px; border-radius:18px 18px 0 0; z-index:90;
    box-shadow:0 -10px 30px rgba(0,0,0,0.7);
  }
  .np{justify-content:space-between; width:100%;}
  .np .meta .t, .np .meta .a{max-width:180px;}
  .controls{width:100%;}
  .seek-row{max-width:100%; gap:6px;}
  .right-tools{justify-content:space-between; width:100%; border-top:1px solid var(--glass-brd); padding-top:8px;}
  .vol-wrap{width:100px;}
  
  .drawer{width:100vw;}
  .toast-stack{bottom:180px; right:12px; left:12px;}
  .toast{width:100%; text-align:center;}
}

@media(max-width:480px){
  .card{width:130px;}
  .vis-canvas{display:none;}
}
</style>
</head>
<body>

<div class="aurora"></div>
<canvas id="bg-canvas"></canvas>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="mark"></span> Nocturne</div>

    <nav class="nav-group">
      <div class="nav-item active" data-view="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg> Home</div>
      <div class="nav-item" data-view="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg> Search</div>
      <div class="nav-item" data-view="library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Your Library</div>
      <div class="nav-item" data-view="liked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 000-7.8z"/></svg> Liked Songs</div>
      <div class="nav-item" data-view="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg> Recently Played</div>
    </nav>

    <div class="nav-group">
      <div class="nav-label">Playlists <button id="newPlaylistBtn" style="float:right;color:var(--gold);font-size:16px;">＋</button></div>
      <div id="playlistNav" style="display:flex;flex-direction:column;gap:2px;"></div>
    </div>

    <div class="filters">
      <div class="nav-label" style="padding-left:0;">Filters</div>
      <select id="filterCountry"><option value="">All Countries</option></select>
      <select id="filterGenre"><option value="">All Genres</option></select>
      <select id="filterLang"><option value="">All Languages</option></select>
      <label style="display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-1);padding-top:6px;">
        Light mode <input type="checkbox" id="themeToggle">
      </label>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="topbar">
      <button class="icon-btn" id="sidebarToggle" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search songs, artists, albums, genres, moods…" autocomplete="off">
        <button class="mic-btn" id="micBtn" title="Voice search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
        </button>
        <div class="suggest-panel" id="suggestPanel"></div>
      </div>
      <span class="status-pill" id="providerStatus"><span class="dot"></span> Providers ready</span>
      <button class="icon-btn" id="queueBtn" title="Queue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h13M3 12h9M3 18h13M18 15l3 3-3 3"/></svg></button>
    </div>

    <div id="viewRoot"></div>
  </main>

  <footer class="playerbar">
    <div class="np" id="npBlock">
      <div class="art-wrap"><img id="npArt" src="" alt=""></div>
      <div class="meta">
        <div class="t" id="npTitle">Nothing playing</div>

<script>
/* ================================================================

/* ---------------------------------------------------------------

const CONFIG = {
  PROVIDERS: ["youtube", "audius", "itunes", "deezer", "jamendo", "lastfm"],
  API_KEYS: {

  },

  COUNTRIES: ["Indonesia","United States","United Kingdom","Japan","Korea","China","Thailand","India","Malaysia","France","Germany","Spain","Italy","Turkey","Brazil","Nigeria","Egypt","Mexico","Colombia"],
  GENRES: ["Pop","Hip-Hop","Rock","Electronic","R&B","Jazz","Classical","K-Pop","J-Pop","Reggae","Country","Metal","Folk","Latin","Afrobeat","Lo-fi"],

/* ---------------------------------------------------------------
   2. UTILS

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const store = {
  get(k, d){ try{ return JSON.parse(localStorage.getItem("noct_"+k)) ?? d; }catch(e){ return d; } },
  set(k, v){ localStorage.setItem("noct_"+k, JSON.stringify(v)); }
};
function fmtTime(s){ if(!isFinite(s)||s<0) s=0; const m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+String(r).padStart(2,"0"); }
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
function toast(msg, kind=""){
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  if(kind==="err") el.style.borderColor = "var(--danger)";
  $("#toastStack").appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
function uid(){ return Math.random().toString(36).slice(2,10); }
async function fetchJSON(url, opts){
  const res = await fetch(url, opts);
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}
async function fetchWithProxyFallback(url){
  try{ return await fetchJSON(url); }
  catch(e){
    for(const proxy of CONFIG.CORS_PROXIES){
      try{ return await fetchJSON(proxy + encodeURIComponent(url)); }
      catch(e2){}
    }
    throw e;
  }
}

/* ---------------------------------------------------------------
   3. PROVIDER ADAPTERS
   --------------------------------------------------------------- */
const Providers = {};

Providers.youtube = {
  async search(q){
    if(!CONFIG.API_KEYS.youtube) return [];
    const d = await fetchJSON(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=25&q=${encodeURIComponent(q+" official audio")}&key=${CONFIG.API_KEYS.youtube}`);
    return (d.items||[]).map(it => ({
      id:"youtube_"+it.id.videoId, provider:"youtube", videoId:it.id.videoId,
      title:it.snippet.title, artist:it.snippet.channelTitle, album:"",
      cover:it.snippet.thumbnails?.high?.url || it.snippet.thumbnails?.default?.url,
      duration:0, streamUrl:null, previewOnly:false, sourceUrl:"https://www.youtube.com/watch?v="+it.id.videoId
    }));
  },
  async trending(){
    if(!CONFIG.API_KEYS.youtube) return [];
    const d = await fetchJSON(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&videoCategoryId=10&maxResults=20&regionCode=ID&key=${CONFIG.API_KEYS.youtube}`);
    return (d.items||[]).map(it => ({
      id:"youtube_"+it.id, provider:"youtube", videoId:it.id,
      title:it.snippet.title, artist:it.snippet.channelTitle, album:"",
      cover:it.snippet.thumbnails?.high?.url || it.snippet.thumbnails?.default?.url,
      duration:0, streamUrl:null, previewOnly:false, sourceUrl:"https://www.youtube.com/watch?v="+it.id
    }));
  },
  async streamUrl(){ return null; }
};

Providers.audius = (() => {
  let host = null;
  async function getHost(){
    if(host) return host;
    try{
      const d = await fetchJSON("https://api.audius.co");
      host = d.data[Math.floor(Math.random()*d.data.length)];
    }catch(e){ host = "https://discoveryprovider.audius.co"; }
    return host;
  }
  function normalize(t){
    return {
      id:"audius_"+t.id, provider:"audius", title:t.title, artist:t.user?.name || "Unknown Artist",
      album:t.album || "Audius", cover: t.artwork?.["480x480"] || t.artwork?.["150x150"] || "",
      duration:t.duration || 0, streamUrl:null, trackId:t.id, previewOnly:false, sourceUrl:"https://audius.co"
    };
  }
  return {
    async search(q){
      const h = await getHost();
      const d = await fetchJSON(`${h}/v1/tracks/search?query=${encodeURIComponent(q)}&app_name=NOCTURNE`);
      return (d.data||[]).map(normalize);
    },
    async trending(){
      const h = await getHost();
      const d = await fetchJSON(`${h}/v1/tracks/trending?app_name=NOCTURNE`);
      return (d.data||[]).slice(0,20).map(normalize);
    },
    async streamUrl(track){
      const h = await getHost();
      return `${h}/v1/tracks/${track.trackId}/stream?app_name=NOCTURNE`;
    }
  };
})();

Providers.itunes = {
  async search(q){
    const d = await fetchJSON(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=25`);
    return (d.results||[]).map(t => ({
      id:"itunes_"+t.trackId, provider:"itunes", title:t.trackName, artist:t.artistName,
      album:t.collectionName, cover:(t.artworkUrl100||"").replace("100x100","400x400"),
      duration:Math.round((t.trackTimeMillis||0)/1000), streamUrl:t.previewUrl, previewOnly:true,
      sourceUrl:t.trackViewUrl
    }));
  },
  async trending(){
    const d = await fetchJSON(`https://itunes.apple.com/us/rss/topsongs/limit=20/json`);
    const entries = d.feed?.entry || [];
    return entries.map(e => ({
      id:"itunes_top_"+e.id.attributes["im:id"], provider:"itunes",
      title:e["im:name"].label, artist:e["im:artist"].label, album:e["im:collection"]?.["im:name"]?.label || "",
      cover:e["im:image"]?.[2]?.label || "", duration:0, streamUrl:null, previewOnly:true, sourceUrl:e.link?.attributes?.href,
      trackId:e.id.attributes["im:id"]
    }));
  },
  async streamUrl(track){
    if(track.streamUrl) return track.streamUrl;
    const d = await fetchJSON(`https://itunes.apple.com/lookup?id=${track.trackId}`);
    return d.results?.[0]?.previewUrl || null;
  }
};

Providers.deezer = {
  async search(q){
    const d = await fetchWithProxyFallback(`https://api.deezer.com/search?q=${encodeURIComponent(q)}`);
    return (d.data||[]).map(t => ({
      id:"deezer_"+t.id, provider:"deezer", title:t.title, artist:t.artist?.name,

Providers.jamendo = {

    }));

      cover:t.image, duration:t.duration, streamUrl:t.audio, previewOnly:false, sourceUrl:t.shareurl
    }));

};

Providers.lastfm = {
  async search(){ return []; }, async trending(){ return []; }, async streamUrl(){ return null; },
  async similar(artist){
    if(!CONFIG.API_KEYS.lastfm) return [];
    try{
      const d = await fetchJSON(`https://ws.audioscrobbler.com/2.0/?method=artist.getsimilar&artist=${encodeURIComponent(artist)}&api_key=${CONFIG.API_KEYS.lastfm}&format=json`);
      return (d.similarartists?.artist||[]).map(a=>a.name);

/* ---------------------------------------------------------------
   4. SEARCH ENGINE
   --------------------------------------------------------------- */
const SearchEngine = {
  async search(query, {merge=true} = {}){
    if(!query || !query.trim()) return [];
    let all = [];
    for(const key of CONFIG.PROVIDERS){
      const provider = Providers[key];
      if(!provider || !provider.search) continue;
      try{
        const res = await provider.search(query);
        if(res.length){
          all = all.concat(res);
          setProviderStatus(key, true);
          if(!merge) break;
        }
      }catch(err){
        setProviderStatus(key, false);
      }
    }
    return all;
  },
  async trending(){
    let all = [];
    for(const key of ["audius","itunes","deezer","jamendo"]){
      const provider = Providers[key];
      if(!provider?.trending) continue;
      try{
        const res = await provider.trending();
        all = all.concat(res);
      }catch(e){}
    }
    return all;
  }
};

function setProviderStatus(name, ok){
  const pill = $("#providerStatus");
  if(!pill) return;
  pill.querySelector(".dot").style.background = ok ? "var(--teal)" : "var(--danger)";
  pill.lastChild.textContent = " " + name + (ok ? " ok" : " skipped");
}

/* ---------------------------------------------------------------
   5. LIBRARY
   --------------------------------------------------------------- */
const Library = {
  liked: store.get("liked", []),
  history: store.get("history", []),
  playlists: store.get("playlists", []),
  searchHistory: store.get("searchHistory", []),
  save(){
    store.set("liked", this.liked);
    store.set("history", this.history);
    store.set("playlists", this.playlists);
    store.set("searchHistory", this.searchHistory);
  },
  isLiked(id){ return this.liked.some(t=>t.id===id); },
  toggleLike(track){
    if(this.isLiked(track.id)){ this.liked = this.liked.filter(t=>t.id!==track.id); toast("Removed from Liked Songs"); }
    else { this.liked.unshift(track); toast("Added to Liked Songs"); }
    this.save(); renderNP();
  },
  addHistory(track){
    this.history = [track, ...this.history.filter(t=>t.id!==track.id)].slice(0,50);
    this.save();
  },
  createPlaylist(name){
    const pl = {id:uid(), name, tracks:[]};
    this.playlists.push(pl); this.save(); renderPlaylistNav(); return pl;
  },
  renamePlaylist(id, name){
    const pl = this.playlists.find(p=>p.id===id); if(pl){ pl.name = name; this.save(); renderPlaylistNav(); }
  },
  deletePlaylist(id){
    this.playlists = this.playlists.filter(p=>p.id!==id); this.save(); renderPlaylistNav();
  },
  addToPlaylist(id, track){
    const pl = this.playlists.find(p=>p.id===id);
    if(pl && !pl.tracks.some(t=>t.id===track.id)){ pl.tracks.push(track); this.save(); toast(`Added to "${pl.name}"`); }
  }
};

/* ---------------------------------------------------------------
   6. PLAYER ENGINE (100% UNLOCKED FOR MOBILE & LAPTOP)
   --------------------------------------------------------------- */
const audio = $("#audio");

const YT_ENGINE = {
  player: null, ready: false, pendingVideoId: null, tickTimer: null,
  init(){
    if(window.YT && window.YT.Player){ this._create(); return; }
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => this._create();
  },
  _create(){
    this.player = new YT.Player("ytPlayer", {
      height: "1", width: "1", playerVars: { autoplay: 0, controls: 0, disablekb: 1 },
      events: {
        onReady: () => { this.ready = true; if(this.pendingVideoId){ this.player.loadVideoById(this.pendingVideoId); this.pendingVideoId=null; } },
        onStateChange: (e) => {
          if(e.data === YT.PlayerState.PLAYING){ $("#playIcon").innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'; $("#npBlock").classList.add("playing"); this._startTick(); }
          else if(e.data === YT.PlayerState.PAUSED){ $("#playIcon").innerHTML='<path d="M8 5v14l11-7z"/>'; $("#npBlock").classList.remove("playing"); }
          else if(e.data === YT.PlayerState.ENDED){ Player.next(); }
        }
      }
    });
  },
  loadVideo(videoId){
    if(this.ready && this.player) this.player.loadVideoById(videoId);
    else this.pendingVideoId = videoId;
  },
  play(){ this.player?.playVideo(); },
  pause(){ this.player?.pauseVideo(); },
  seek(sec){ this.player?.seekTo(sec, true); },
  setVolume(v){ this.player?.setVolume(Math.round(v*100)); },
  mute(m){ m ? this.player?.mute() : this.player?.unMute(); },
  _startTick(){
    clearInterval(this.tickTimer);
    this.tickTimer = setInterval(()=>{
      if(!this.player || !this.player.getCurrentTime) return;
      const cur = this.player.getCurrentTime() || 0, dur = this.player.getDuration() || 0;
      const p = dur ? (cur/dur)*100 : 0;
      $("#seekFill").style.width = p+"%"; $("#seekKnob").style.left = p+"%";
      $("#curTime").textContent = fmtTime(cur); $("#durTime").textContent = fmtTime(dur);
    }, 500);
  }
};
YT_ENGINE.init();

const Player = {
  queue: [], index: -1, shuffle: false, repeat: "off",
  activeEngine: "audio",
  current(){ return this.queue[this.index] || null; },
  async playTrack(track, queueContext){
    if(queueContext){ this.queue = queueContext; this.index = queueContext.findIndex(t=>t.id===track.id); }
    else { this.queue = [track]; this.index = 0; }
    await this._loadAndPlay(track);
  },
  async _loadAndPlay(track){
    renderNP(); 
    renderQueueDrawer();

    if(track.provider === "youtube"){
      this.activeEngine = "youtube";
      audio.pause();
      YT_ENGINE.loadVideo(track.videoId);
      YT_ENGINE.play();
      Library.addHistory(track);
      return;
    }

    this.activeEngine = "audio";
    YT_ENGINE.pause();

    const provider = Providers[track.provider];
    let url = track.streamUrl;
    try{ if(!url && provider?.streamUrl) url = await provider.streamUrl(track); }catch(e){}

    if(!url){ toast(`No stream available for "${track.title}"`, "err"); return this.next(); }

    audio.src = url;
    try{ 
      await audio.play(); 
    }catch(e){ 
      console.warn("Autoplay gesture required", e); 
    }

    Library.addHistory(track);
    initVisualizer();
  },
  toggle(){
    if(!this.current()) return;
    if(this.activeEngine === "youtube"){
      const state = YT_ENGINE.player?.getPlayerState?.();
      state === 1 ? YT_ENGINE.pause() : YT_ENGINE.play();
    } else { audio.paused ? audio.play() : audio.pause(); }
  },
  next(){
    if(!this.queue.length) return;
    if(this.repeat==="one"){
      if(this.activeEngine==="youtube") YT_ENGINE.seek(0); else audio.currentTime=0;
      this.toggle(); return;
    }
    if(this.shuffle){ this.index = Math.floor(Math.random()*this.queue.length); }
    else { this.index++; }
    if(this.index >= this.queue.length){
      if(this.repeat==="all") this.index = 0; else { this.index = this.queue.length-1; return; }
    }
    this._loadAndPlay(this.queue[this.index]);
  },
  prev(){
    if(!this.queue.length) return;
    const cur = this.activeEngine==="youtube" ? (YT_ENGINE.player?.getCurrentTime?.()||0) : audio.currentTime;
    if(cur > 3){ this.activeEngine==="youtube" ? YT_ENGINE.seek(0) : (audio.currentTime = 0); return; }
    this.index = Math.max(0, this.shuffle ? Math.floor(Math.random()*this.queue.length) : this.index-1);
    this._loadAndPlay(this.queue[this.index]);
  }
};

audio.addEventListener("ended", ()=>Player.next());
audio.addEventListener("play", ()=>{ $("#playIcon").innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'; $("#npBlock").classList.add("playing"); });
audio.addEventListener("pause", ()=>{ $("#playIcon").innerHTML='<path d="M8 5v14l11-7z"/>'; $("#npBlock").classList.remove("playing"); });
audio.addEventListener("timeupdate", ()=>{
  if(Player.activeEngine !== "audio") return;
  const p = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  $("#seekFill").style.width = p+"%"; $("#seekKnob").style.left = p+"%";
  $("#curTime").textContent = fmtTime(audio.currentTime);
});
audio.addEventListener("loadedmetadata", ()=>{ if(Player.activeEngine==="audio") $("#durTime").textContent = fmtTime(audio.duration); });

/* ---------------------------------------------------------------
   7. VISUALIZER
   --------------------------------------------------------------- */
let audioCtx, analyser, sourceNode;
function initVisualizer(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    sourceNode.connect(analyser); analyser.connect(audioCtx.destination);
    drawVis();
  }
  if(audioCtx.state==="suspended") audioCtx.resume();
}
function drawVis(){
  const canvas = $("#visCanvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = 64; canvas.height = 28;
  const data = new Uint8Array(analyser.frequencyBinCount);
  (function loop(){
    requestAnimationFrame(loop);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,64,28);
    const bars = 14, gap=2, bw=(64-gap*(bars-1))/bars;
    for(let i=0;i<bars;i++){
      const v = data[i*2] / 255;
      const h = Math.max(2, v*26);
      const grad = ctx.createLinearGradient(0,28-h,0,28);
      grad.addColorStop(0,"#e8b368"); grad.addColorStop(1,"#8a6a3d33");
      ctx.fillStyle = grad;
      ctx.fillRect(i*(bw+gap), 28-h, bw, h);
    }
  })();
}
(function bgParticles(){
  const canvas = $("#bg-canvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  let w,h,parts;
  function resize(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight;
    parts = Array.from({length:50},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.6+.3,vy:Math.random()*.25+.05,o:Math.random()*.5+.1})); }
  resize(); addEventListener("resize", resize);
  (function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "rgba(232,179,104,.6)";
    parts.forEach(p=>{
      p.y -= p.vy; if(p.y<0) p.y=h;
      ctx.globalAlpha = p.o;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    });
    ctx.globalAlpha = 1;
  })();
})();

/* ---------------------------------------------------------------
   8. LYRICS
   --------------------------------------------------------------- */
async function loadLyrics(track){
  $("#drawerTitle").textContent = "Lyrics";
  $("#drawerBody").innerHTML = `<div class="lyrics-body">Loading lyrics…</div>`;
  openDrawer();
  try{
    const d = await fetchJSON(`https://api.lyrics.ovh/v1/${encodeURIComponent(track.artist)}/${encodeURIComponent(track.title)}`);
    $("#drawerBody").innerHTML = `<div class="lyrics-body">${(d.lyrics||"Lyrics not available.").replace(/</g,"&lt;")}</div>`;
  }catch(e){
    $("#drawerBody").innerHTML = `<div class="lyrics-body">Lyrics not available.</div>`;
  }
}

/* ---------------------------------------------------------------
   9. UI RENDER
   --------------------------------------------------------------- */
function trackCardHTML(t){
  return `<div class="card" data-id="${t.id}">
    <div class="art"><img loading="lazy" src="${t.cover||''}" onerror="this.style.opacity=0">
      <div class="playhit"><button class="cardPlay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button></div>
      ${t.previewOnly ? '<span class="badge">Preview</span>' : ''}
    </div>
    <div class="title">${t.title}</div><div class="sub">${t.artist}</div>
  </div>`;
}
function trackRowHTML(t, i){
  return `<div class="list-row" data-id="${t.id}">
    <div class="idx">${i+1}</div>
    <img class="thumb" loading="lazy" src="${t.cover||''}" onerror="this.style.opacity=0">
    <div class="meta"><div class="t">${t.title}</div><div class="a">${t.artist}${t.previewOnly?' · preview':''}</div></div>
    <div class="dur">${t.duration?fmtTime(t.duration):''}</div>
    <div class="row-actions">
      <button class="rowLike" title="Like"><svg viewBox="0 0 24 24" fill="${Library.isLiked(t.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 000-7.8z"/></svg></button>
      <button class="rowAdd" title="Add to playlist">＋</button>
      <button class="rowLyrics" title="Lyrics">Ly</button>
    </div>
  </div>`;
}
let trackCache = {};
function cacheTracks(list){ list.forEach(t=>trackCache[t.id]=t); }

function skeletonGrid(n=8){ return `<div class="grid">${Array.from({length:n}).map(()=>`<div class="skeleton" style="height:200px;"></div>`).join('')}</div>`; }

async function renderHome(){
  const root = $("#viewRoot");
  root.innerHTML = `
    <div class="section-title"><h2>Trending Now</h2><span>Across providers</span></div>
    <div id="trendingWrap" class="hscroll">${skeletonGrid(6)}</div>
    <div class="section-title"><h2>Recently Played</h2></div>
    <div id="recentWrap" class="hscroll">${Library.history.length? Library.history.slice(0,10).map(trackCardHTML).join('') : emptyStateHTML("No history yet — play something!")}</div>
  `;
  cacheTracks(Library.history);
  bindTrackClicks(root);
  const trending = await SearchEngine.trending();
  cacheTracks(trending);
  $("#trendingWrap").innerHTML = trending.length ? trending.map(trackCardHTML).join('') : emptyStateHTML("Providers unavailable right now.");
  bindTrackClicks(root);
}
function emptyStateHTML(msg){
  return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg><div>${msg}</div></div>`;
}
async function renderSearchResults(query){
  const root = $("#viewRoot");
  root.innerHTML = `<div class="section-title"><h2>Results for "${query}"</h2></div><div id="resultsWrap">${skeletonGrid(10)}</div>`;
  const results = await SearchEngine.search(query);
  cacheTracks(results);
  $("#resultsWrap").innerHTML = results.length
    ? `<div>${results.map((t,i)=>trackRowHTML(t,i)).join('')}</div>`
    : emptyStateHTML("No results across any provider. Try another keyword.");
  bindTrackClicks(root);
}
function renderLiked(){
  const root = $("#viewRoot");
  root.innerHTML = `<div class="section-title"><h2>Liked Songs</h2><span>${Library.liked.length} songs</span></div>
    <div>${Library.liked.length ? Library.liked.map((t,i)=>trackRowHTML(t,i)).join('') : emptyStateHTML("Songs you like will show up here.")}</div>`;
  cacheTracks(Library.liked); bindTrackClicks(root);
}
function renderHistory(){
  const root = $("#viewRoot");
  root.innerHTML = `<div class="section-title"><h2>Recently Played</h2></div>
    <div>${Library.history.length ? Library.history.map((t,i)=>trackRowHTML(t,i)).join('') : emptyStateHTML("Nothing played yet.")}</div>`;
  cacheTracks(Library.history); bindTrackClicks(root);
}
function renderLibrary(){
  const root = $("#viewRoot");
  root.innerHTML = `<div class="section-title"><h2>Your Library</h2></div>
    <div class="grid">${Library.playlists.map(p=>`
      <div class="card" data-playlist="${p.id}">
        <div class="art" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-2),var(--glass));">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="title">${p.name}</div><div class="sub">${p.tracks.length} songs</div>
      </div>`).join('') || emptyStateHTML("Create your first playlist from the sidebar.")}
    </div>`;
  $$('[data-playlist]', root).forEach(card=>{
    card.addEventListener("click", ()=>renderPlaylistDetail(card.dataset.playlist));
  });
}
function renderPlaylistDetail(id){
  const pl = Library.playlists.find(p=>p.id===id); if(!pl) return;
  const root = $("#viewRoot");
  root.innerHTML = `<div class="section-title"><h2>${pl.name}</h2><span>${pl.tracks.length} songs</span>
    <button class="icon-btn" id="renamePl" style="margin-left:auto;">✎</button>
    <button class="icon-btn" id="deletePl">🗑</button></div>
    <div>${pl.tracks.length ? pl.tracks.map((t,i)=>trackRowHTML(t,i)).join('') : emptyStateHTML("Add songs from search results.")}</div>`;
  cacheTracks(pl.tracks); bindTrackClicks(root, pl.tracks);
  $("#renamePl").onclick = ()=>openModal("Rename Playlist", pl.name, (val)=>Library.renamePlaylist(pl.id, val));
  $("#deletePl").onclick = ()=>{ Library.deletePlaylist(pl.id); renderLibrary(); toast("Playlist deleted"); };
}
function renderPlaylistNav(){
  $("#playlistNav").innerHTML = Library.playlists.map(p=>`<div class="nav-item" data-open-pl="${p.id}">🎵 ${p.name}</div>`).join('');
  $$("[data-open-pl]").forEach(el=>el.addEventListener("click", ()=>{ setActiveView(null); renderPlaylistDetail(el.dataset.openPl); closeSidebarMobile(); }));
}

/* FIX SINGLE CLICK/TAP UNTUK MEMUTAR LAGU ANGKAT DARI DBLCLICK */
function bindTrackClicks(root, contextList){
  $$(".card, .list-row", root).forEach(el=>{
    const id = el.dataset.id;
    if(!id) return;
    const track = trackCache[id];
    if(!track) return;

    const playHandler = (e)=>{
      if(e.target.closest(".row-actions")) return; // Jangan putar jika klik tombol aksi
      
      // Unlock AudioContext secara sinkron saat klik pengguna
      audio.play().then(()=>{}).catch(()=>{});
      if(window.audioCtx && audioCtx.state === "suspended") audioCtx.resume();

      Player.playTrack(track, contextList || Object.values(trackCache));
    };

    el.querySelector(".cardPlay")?.addEventListener("click", (e)=>{ e.stopPropagation(); playHandler(e); });
    
    // Single-click listener untuk memutar lagu langsung di Laptop maupun HP
    el.addEventListener("click", playHandler);

    el.querySelector(".rowLike")?.addEventListener("click", (e)=>{ e.stopPropagation(); Library.toggleLike(track); renderCurrentView(); });
    el.querySelector(".rowLyrics")?.addEventListener("click", (e)=>{ e.stopPropagation(); loadLyrics(track); });
    el.querySelector(".rowAdd")?.addEventListener("click", (e)=>{
      e.stopPropagation();
      if(!Library.playlists.length){ toast("Create a playlist first", "err"); return; }
      openDrawer("Add to Playlist", Library.playlists.map(p=>
        `<div class="list-row" data-add-pl="${p.id}"><div></div><div></div><div class="meta t">${p.name}</div><div></div><div></div></div>`
      ).join(''));
      $$("[data-add-pl]").forEach(r=>r.addEventListener("click", ()=>{ Library.addToPlaylist(r.dataset.addPl, track); closeDrawer(); }));
    });
  });
}

function renderNP(){
  const t = Player.current();
  if(!t){ $("#npTitle").textContent="Nothing playing"; $("#npArtist").textContent="Search to begin"; $("#npArt").src=""; return; }
  $("#npTitle").textContent = t.title; $("#npArtist").textContent = t.artist; $("#npArt").src = t.cover || "";
  const liked = Library.isLiked(t.id);
  $("#npHeart").classList.toggle("liked", liked);
  $("#npHeart").querySelector("svg").setAttribute("fill", liked ? "currentColor" : "none");
}
function renderQueueDrawer(){
  if($("#drawerTitle").textContent !== "Queue") return;
  $("#drawerBody").innerHTML = Player.queue.map((t,i)=>`
    <div class="list-row ${i===Player.index?'playing':''}" data-q="${i}">
      <div class="idx">${i+1}</div><img class="thumb" src="${t.cover||''}"><div class="meta t">${t.title}</div><div class="a" style="grid-column:3;margin-top:16px;">${t.artist}</div><div></div>
    </div>`).join('') || emptyStateHTML("Queue is empty.");
  $$("[data-q]").forEach(r=>r.addEventListener("click", ()=>{ Player.index=+r.dataset.q; Player._loadAndPlay(Player.queue[Player.index]); }));
}
function openDrawer(title="Queue", html){
  $("#drawerTitle").textContent = title;
  if(html!==undefined) $("#drawerBody").innerHTML = html; else renderQueueDrawer();
  $("#drawer").classList.add("open");
}
function closeDrawer(){ $("#drawer").classList.remove("open"); }
function openModal(title, prefill, onConfirm){
  $("#modalTitle").textContent = title; $("#modalInput").value = prefill||"";
  $("#modalBackdrop").classList.add("open"); $("#modalInput").focus();
  $("#modalConfirm").onclick = ()=>{ const v=$("#modalInput").value.trim(); if(v) onConfirm(v); $("#modalBackdrop").classList.remove("open"); };
}

let activeView = "home";
function setActiveView(view){
  activeView = view;
  $$(".nav-item[data-view]").forEach(el=>el.classList.toggle("active", el.dataset.view===view));
}
function renderCurrentView(){
  if(activeView==="home") renderHome();
  else if(activeView==="liked") renderLiked();
  else if(activeView==="history") renderHistory();
  else if(activeView==="library") renderLibrary();
}

function closeSidebarMobile(){
  if(innerWidth <= 880){
    $("#sidebar").classList.remove("open");
    $("#sidebarOverlay").classList.remove("active");
  }
}

/* ---------------------------------------------------------------
   10. EVENTS
   --------------------------------------------------------------- */
$$(".nav-item[data-view]").forEach(el=>{
  el.addEventListener("click", ()=>{
    setActiveView(el.dataset.view);
    closeSidebarMobile();
    if(el.dataset.view==="search") $("#searchInput").focus();
    else renderCurrentView();
  });
});

const doSearch = debounce((q)=>{
  if(!q.trim()){ $("#suggestPanel").classList.remove("open"); return; }
  renderSearchResults(q);
  if(!Library.searchHistory.includes(q)){ Library.searchHistory.unshift(q); Library.searchHistory = Library.searchHistory.slice(0,20); Library.save(); }
}, 420);
$("#searchInput").addEventListener("input", (e)=>{
  const v = e.target.value;
  renderSuggestions(v);
  doSearch(v);
});
function renderSuggestions(v){
  const panel = $("#suggestPanel");
  if(!v.trim()){
    panel.innerHTML = Library.searchHistory.slice(0,6).map(h=>`<div class="suggest-row" data-h="${h}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>${h}</div>`).join('');
    panel.classList.toggle("open", Library.searchHistory.length>0);
    return;
  }
  const matches = Library.searchHistory.filter(h=>h.toLowerCase().includes(v.toLowerCase())).slice(0,6);
  panel.innerHTML = matches.map(h=>`<div class="suggest-row" data-h="${h}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>${h}</div>`).join('');
  panel.classList.toggle("open", matches.length>0);
}
$("#suggestPanel").addEventListener("click", (e)=>{
  const row = e.target.closest("[data-h]"); if(!row) return;
  $("#searchInput").value = row.dataset.h;
  $("#suggestPanel").classList.remove("open");
  setActiveView("search"); renderSearchResults(row.dataset.h);
});
$("#searchInput").addEventListener("focus", ()=>renderSuggestions($("#searchInput").value));
document.addEventListener("click", (e)=>{ if(!e.target.closest(".search-wrap")) $("#suggestPanel").classList.remove("open"); });

// Voice search
$("#micBtn").addEventListener("click", ()=>{
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Voice search not supported in this browser", "err"); return; }
  const rec = new SR(); rec.lang = "en-US"; rec.interimResults = false;
  $("#micBtn").classList.add("listening");
  rec.onresult = (e)=>{ const text = e.results[0][0].transcript; $("#searchInput").value = text; setActiveView("search"); renderSearchResults(text); };
  rec.onend = ()=> $("#micBtn").classList.remove("listening");
  rec.onerror = ()=>{ $("#micBtn").classList.remove("listening"); toast("Voice search failed", "err"); };
  rec.start();
});

// Transport controls
$("#playBtn").addEventListener("click", ()=>{
  if(window.audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  Player.toggle();
});
$("#nextBtn").addEventListener("click", ()=>Player.next());
$("#prevBtn").addEventListener("click", ()=>Player.prev());
$("#shuffleBtn").addEventListener("click", (e)=>{ Player.shuffle=!Player.shuffle; e.currentTarget.classList.toggle("active", Player.shuffle); toast(Player.shuffle?"Shuffle on":"Shuffle off"); });
$("#repeatBtn").addEventListener("click", (e)=>{
  Player.repeat = Player.repeat==="off"?"all":Player.repeat==="all"?"one":"off";
  e.currentTarget.classList.toggle("active", Player.repeat!=="off");
  toast("Repeat: "+Player.repeat);
});
$("#npHeart").addEventListener("click", ()=>{ const t=Player.current(); if(t) Library.toggleLike(t); });

function seekTo(clientX, bar, cb){
  const rect = bar.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (clientX-rect.left)/rect.width));
  cb(pct);
}
$("#seekBar").addEventListener("click", (e)=>seekTo(e.clientX, e.currentTarget, (p)=>{
  if(Player.activeEngine==="youtube"){ const dur = YT_ENGINE.player?.getDuration?.()||0; if(dur) YT_ENGINE.seek(p*dur); }
  else if(audio.duration) audio.currentTime = p*audio.duration;
}));
$("#volBar").addEventListener("click", (e)=>seekTo(e.clientX, e.currentTarget, (p)=>{
  audio.volume = p; YT_ENGINE.setVolume(p);
  $("#volFill").style.width=(p*100)+"%"; $("#volKnob").style.left=(p*100)+"%";
}));
$("#muteBtn").addEventListener("click", ()=>{
  audio.muted = !audio.muted;
  YT_ENGINE.mute(audio.muted);
  $("#volIcon").style.opacity = audio.muted ? .4 : 1;
});

$("#queueBtn").addEventListener("click", ()=>openDrawer("Queue"));
$("#drawerClose").addEventListener("click", closeDrawer);
$("#lyricsBtn").addEventListener("click", ()=>{ const t=Player.current(); if(t) loadLyrics(t); else toast("Nothing playing", "err"); });
$("#shareBtn").addEventListener("click", async ()=>{
  const t = Player.current(); if(!t){ toast("Nothing playing","err"); return; }
  const url = t.sourceUrl || location.href;
  try{ await navigator.clipboard.writeText(url); toast("Link copied to clipboard"); }
  catch(e){ toast(url); }
});

$("#newPlaylistBtn").addEventListener("click", ()=>openModal("Create Playlist", "", (name)=>{ Library.createPlaylist(name); toast(`Created "${name}"`); }));
$("#modalCancel").addEventListener("click", ()=>$("#modalBackdrop").classList.remove("open"));

$("#themeToggle").addEventListener("change", (e)=>{
  document.documentElement.setAttribute("data-theme", e.target.checked ? "light" : "dark");
  store.set("theme", e.target.checked ? "light" : "dark");
});

$("#sidebarToggle").addEventListener("click", ()=>{
  $("#sidebar").classList.toggle("open");
  $("#sidebarOverlay").classList.toggle("active");
});
$("#sidebarOverlay").addEventListener("click", closeSidebarMobile);

// Keyboard shortcuts
document.addEventListener("keydown", (e)=>{
  if(document.activeElement.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); Player.toggle(); }
  else if(e.key==="ArrowRight" && e.shiftKey) Player.next();
  else if(e.key==="ArrowLeft" && e.shiftKey) Player.prev();
  else if(e.key.toLowerCase()==="s") $("#shuffleBtn").click();
  else if(e.key.toLowerCase()==="r") $("#repeatBtn").click();
  else if(e.key.toLowerCase()==="l") { const t=Player.current(); if(t) Library.toggleLike(t); }
});

/* ---------------------------------------------------------------
   11. INIT
   --------------------------------------------------------------- */
function populateFilters(){
  $("#filterCountry").innerHTML += CONFIG.COUNTRIES.map(c=>`<option>${c}</option>`).join('');
  $("#filterGenre").innerHTML += CONFIG.GENRES.map(g=>`<option>${g}</option>`).join('');
  $("#filterLang").innerHTML += CONFIG.LANGUAGES.map(l=>`<option>${l}</option>`).join('');
  [$("#filterCountry"),$("#filterGenre"),$("#filterLang")].forEach(sel=>{
    sel.addEventListener("change", ()=>{
      const parts = [sel.value].filter(Boolean);
      if(parts.length){ $("#searchInput").value = parts.join(" "); setActiveView("search"); renderSearchResults(parts.join(" ")); }
    });
  });
}
(function init(){
  const savedTheme = store.get("theme","dark");
  if(savedTheme==="light"){ document.documentElement.setAttribute("data-theme","light"); $("#themeToggle").checked = true; }
  populateFilters();
  renderPlaylistNav();
  renderNP();
  audio.volume = 0.8;
  renderHome();
  if(innerWidth <= 880) $("#sidebarToggle").style.display = "flex";
})();
</script>
</body>
</html>
